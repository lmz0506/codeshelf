<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="format-detection" content="telephone=no">
<title>跨设备传输 · CodeShelf</title>
<style>
:root {
  --bg-primary: #ffffff;
  --bg-secondary: #f9fafb;
  --bg-tertiary: #f3f4f6;
  --border: #e5e7eb;
  --text-primary: #111827;
  --text-secondary: #4b5563;
  --text-muted: #9ca3af;
  --accent: #3b82f6;
  --accent-hover: #2563eb;
  --accent-bg: #eff6ff;
  --green: #10b981;
  --red: #ef4444;
  --orange: #f59e0b;
  --shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
  --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
  --app-height: 100vh;
}
@supports (height: 100dvh) {
  :root { --app-height: 100dvh; }
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg-primary: #1f2937;
    --bg-secondary: #111827;
    --bg-tertiary: #374151;
    --border: #374151;
    --text-primary: #f9fafb;
    --text-secondary: #d1d5db;
    --text-muted: #9ca3af;
    --accent: #60a5fa;
    --accent-hover: #93c5fd;
    --accent-bg: rgba(59, 130, 246, 0.15);
  }
}
body.theme-dark {
  --bg-primary: #1f2937;
  --bg-secondary: #111827;
  --bg-tertiary: #374151;
  --border: #374151;
  --text-primary: #f9fafb;
  --text-secondary: #d1d5db;
  --text-muted: #9ca3af;
  --accent: #60a5fa;
  --accent-hover: #93c5fd;
  --accent-bg: rgba(59, 130, 246, 0.15);
}
body.theme-light {
  --bg-primary: #ffffff;
  --bg-secondary: #f9fafb;
  --bg-tertiary: #f3f4f6;
  --border: #e5e7eb;
  --text-primary: #111827;
  --text-secondary: #4b5563;
  --text-muted: #9ca3af;
  --accent: #3b82f6;
  --accent-hover: #2563eb;
  --accent-bg: #eff6ff;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg-secondary); color: var(--text-primary); }
button { font-family: inherit; cursor: pointer; }

#app { display: flex; height: var(--app-height); overflow: hidden; }

/* Sidebar */
.sidebar { width: 260px; min-width: 220px; background: var(--bg-primary); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: transform 0.2s; height: 100%; }
.sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
.brand { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 15px; }
.brand-icon { width: 24px; height: 24px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; }
.self-card { background: var(--bg-secondary); border-radius: 8px; padding: 10px 12px; display: flex; align-items: center; gap: 10px; }
.self-name { flex: 1; min-width: 0; }
.self-name-text { font-size: 13px; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.self-name-text input { background: transparent; border: none; outline: none; color: inherit; font: inherit; width: 100%; padding: 0; }
.self-status { font-size: 11px; color: var(--text-muted); margin-top: 2px; display: flex; align-items: center; gap: 4px; }
.avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; color: white; font-size: 13px; flex-shrink: 0; }
.peer-list { flex: 1; overflow-y: auto; padding: 8px 0; min-height: 0; }
.peer-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; cursor: pointer; transition: background 0.15s; position: relative; background: transparent; border: none; width: 100%; text-align: left; color: inherit; }
.peer-item:hover { background: var(--bg-secondary); }
.peer-item.active { background: var(--accent-bg); }
.peer-item.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); }
.peer-info { flex: 1; min-width: 0; }
.peer-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary); }
.peer-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.peer-badge { background: var(--red); color: white; border-radius: 10px; padding: 0 6px; font-size: 10px; line-height: 18px; min-width: 18px; text-align: center; font-weight: 600; }
.peer-empty { padding: 32px 16px; text-align: center; color: var(--text-muted); font-size: 13px; line-height: 1.6; }
.qr-section { border-top: 1px solid var(--border); padding: 12px; flex-shrink: 0; }
.qr-toggle { width: 100%; padding: 8px 12px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 6px; color: var(--text-secondary); font-size: 12px; display: flex; align-items: center; justify-content: center; gap: 6px; }
.qr-toggle:hover { background: var(--bg-tertiary); }

/* Main */
.main { flex: 1; display: flex; flex-direction: column; background: var(--bg-secondary); min-width: 0; min-height: 0; height: 100%; }
.main-header { padding: 14px 20px; background: var(--bg-primary); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; min-height: 56px; flex-shrink: 0; }
.back-btn { display: none; padding: 6px 10px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 6px; color: var(--text-secondary); font-size: 13px; }
.main-title { flex: 1; min-width: 0; }
.main-title-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.main-title-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

.empty-main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); padding: 40px; text-align: center; min-height: 0; }
.empty-main svg { width: 80px; height: 80px; opacity: 0.4; margin-bottom: 16px; }
.empty-title { font-size: 16px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
.empty-desc { font-size: 13px; line-height: 1.6; max-width: 360px; }

/* Messages */
.messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; min-height: 0; }
.msg { display: flex; gap: 8px; max-width: 75%; }
.msg.self { align-self: flex-end; flex-direction: row-reverse; }
.msg-body { padding: 8px 12px; border-radius: 12px; background: var(--bg-primary); border: 1px solid var(--border); font-size: 14px; line-height: 1.5; word-break: break-word; white-space: pre-wrap; }
.msg.self .msg-body { background: var(--accent); border-color: var(--accent); color: white; }
.msg-time { font-size: 11px; color: var(--text-muted); margin-top: 4px; text-align: right; }
.msg.self .msg-time { text-align: left; }
.msg-file { display: flex; align-items: center; gap: 10px; min-width: 200px; }
.msg-file-icon { width: 36px; height: 36px; background: rgba(255,255,255,0.2); border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 11px; font-weight: 700; }
.msg.self .msg-file-icon { background: rgba(255,255,255,0.25); }
.msg:not(.self) .msg-file-icon { background: var(--bg-secondary); color: var(--text-secondary); }
.msg-file-name { font-weight: 500; font-size: 13px; word-break: break-all; }
.msg-file-meta { font-size: 11px; opacity: 0.8; margin-top: 2px; }
.msg-file-actions { margin-top: 6px; display: flex; gap: 6px; }
.msg-file-btn { padding: 4px 10px; background: rgba(255,255,255,0.25); border: none; border-radius: 4px; color: white; font-size: 11px; text-decoration: none; display: inline-block; transition: background 0.15s; }
.msg-file-btn:hover { background: rgba(255,255,255,0.4); }
.msg:not(.self) .msg-file-btn { background: var(--accent); color: white; }
.msg:not(.self) .msg-file-btn:hover { background: var(--accent-hover); }
.msg-file-progress { margin-top: 6px; height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; overflow: hidden; }
.msg:not(.self) .msg-file-progress { background: var(--bg-tertiary); }
.msg-file-progress-bar { height: 100%; background: rgba(255,255,255,0.8); transition: width 0.15s linear; width: 0%; }
.msg:not(.self) .msg-file-progress-bar { background: var(--accent); }
.msg-file-status { font-size: 11px; opacity: 0.9; margin-top: 2px; font-variant-numeric: tabular-nums; }
.msg-file-error { color: var(--red); }

/* Composer */
.composer { background: var(--bg-primary); border-top: 1px solid var(--border); padding: 12px 16px; flex-shrink: 0; }
.composer-actions { display: flex; gap: 8px; align-items: flex-end; }
.composer-tools { display: flex; gap: 6px; }
.tool-btn { width: 36px; height: 36px; border-radius: 8px; background: var(--bg-secondary); border: 1px solid var(--border); color: var(--text-secondary); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.tool-btn:hover { background: var(--bg-tertiary); color: var(--accent); }
.tool-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.text-input { flex: 1; min-height: 36px; max-height: 140px; padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-secondary); color: var(--text-primary); font-size: 14px; resize: none; outline: none; line-height: 1.5; font-family: inherit; }
.text-input:focus { border-color: var(--accent); background: var(--bg-primary); }
.send-btn { padding: 0 16px; height: 36px; background: var(--accent); color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 4px; }
.send-btn:hover { background: var(--accent-hover); }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Drop overlay */
.drop-overlay { position: fixed; inset: 0; background: rgba(59, 130, 246, 0.15); backdrop-filter: blur(2px); display: none; align-items: center; justify-content: center; z-index: 200; pointer-events: none; }
.drop-overlay.show { display: flex; }
.drop-overlay-inner { background: var(--bg-primary); border: 2px dashed var(--accent); border-radius: 16px; padding: 32px 48px; color: var(--accent); font-size: 15px; font-weight: 500; display: flex; flex-direction: column; align-items: center; gap: 8px; box-shadow: var(--shadow-lg); }

/* Modal */
.modal-mask { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.5); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 20px; }
.modal { background: var(--bg-primary); border-radius: 12px; padding: 24px; max-width: 480px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); }
.modal-title { font-size: 16px; font-weight: 600; margin: 0 0 16px; display: flex; align-items: center; justify-content: space-between; }
.modal-close { background: none; border: none; color: var(--text-muted); font-size: 20px; padding: 0; line-height: 1; cursor: pointer; }
.url-card { background: var(--bg-secondary); border-radius: 8px; padding: 12px; margin-bottom: 8px; }
.url-iface { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
.url-row { display: flex; align-items: center; gap: 8px; }
.url-text { flex: 1; font-size: 13px; font-weight: 500; word-break: break-all; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, "Cascadia Code", monospace; }
.url-copy { padding: 4px 10px; font-size: 11px; background: var(--accent); border: none; border-radius: 4px; color: white; flex-shrink: 0; }
.url-copy:hover { background: var(--accent-hover); }

/* Toasts */
.toast-stack { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.toast { background: var(--bg-primary); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; font-size: 13px; box-shadow: var(--shadow-lg); animation: slideUp 0.2s; }
.toast.success { border-color: var(--green); }
.toast.error { border-color: var(--red); }
@keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
.status-dot.offline { background: var(--red); }
.status-dot.connecting { background: var(--orange); }

/* Mobile: sidebar takes full screen when shown */
@media (max-width: 720px) {
  .sidebar {
    position: absolute;
    inset: 0;
    z-index: 10;
    width: 100%;
    max-width: 100%;
    transform: translateX(-100%);
  }
  .sidebar.open { transform: translateX(0); }
  .back-btn { display: flex; align-items: center; gap: 4px; }
  .main { width: 100%; }
}

:focus:not(:focus-visible) { outline: none; }

body.embed .brand { display: none; }
body.embed .sidebar-header { padding-top: 12px; }
</style>
</head>
<body>
<div id="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <div class="brand-icon">📡</div>
        <span>跨设备传输</span>
      </div>
      <div class="self-card">
        <div class="avatar" id="self-avatar">?</div>
        <div class="self-name">
          <div class="self-name-text"><input id="self-name-input" maxlength="32" placeholder="点击编辑名称"></div>
          <div class="self-status"><span class="status-dot" id="conn-dot"></span> <span id="conn-text">连接中…</span></div>
        </div>
      </div>
    </div>
    <div class="peer-list" id="peer-list"></div>
    <div class="qr-section">
      <button class="qr-toggle" id="show-qr-btn">📱 查看接入地址</button>
    </div>
  </aside>

  <main class="main">
    <div class="main-header">
      <button class="back-btn" id="back-btn">‹ 设备列表</button>
      <div class="main-title" id="main-title">
        <div class="main-title-name">选择一个设备开始</div>
        <div class="main-title-sub">点击左侧设备发起聊天和传输</div>
      </div>
    </div>
    <div class="messages" id="messages" style="display:none"></div>
    <div class="empty-main" id="empty-main">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
      </svg>
      <div class="empty-title">还没有可聊的设备</div>
      <div class="empty-desc">让其他设备扫描二维码加入这个局域网房间，就可以互相收发文字和文件。所有数据只在内存里中转，关闭浏览器自动清空。</div>
    </div>
    <div class="composer" id="composer" style="display:none">
      <div class="composer-actions">
        <div class="composer-tools">
          <button class="tool-btn" id="attach-btn" title="发送文件">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
          </button>
        </div>
        <textarea id="text-input" class="text-input" rows="1" placeholder="输入消息，Enter 发送，Shift+Enter 换行"></textarea>
        <button id="send-btn" class="send-btn">发送</button>
      </div>
      <input type="file" id="file-input" multiple style="display:none">
    </div>
  </main>
</div>

<div class="drop-overlay" id="drop-overlay">
  <div class="drop-overlay-inner">
    <div style="font-size: 32px;">📥</div>
    <div>松开即可发送文件</div>
  </div>
</div>

<div class="toast-stack" id="toast-stack"></div>

<script>
const state = {
  ws: null,
  selfId: null,
  selfName: null,
  peers: [],
  selected: null,
  conversations: new Map(),
  unread: new Map(),
};
const $ = (id) => document.getElementById(id);

function toast(msg, type='info', duration=3000){
  const div = document.createElement('div');
  div.className = `toast ${type}`;
  div.textContent = msg;
  $('toast-stack').appendChild(div);
  setTimeout(()=>{ div.style.opacity='0'; setTimeout(()=>div.remove(), 200); }, duration);
}

const params = new URLSearchParams(location.search);
if (params.get('embed') === '1') document.body.classList.add('embed');
const themeParam = params.get('theme');
if (themeParam === 'dark') document.body.classList.add('theme-dark');
else if (themeParam === 'light') document.body.classList.add('theme-light');

function avatarColorFor(id){
  if (!id) return '#9ca3af';
  let hash=0;
  for (let i=0;i<id.length;i++) hash = (hash*31 + id.charCodeAt(i)) & 0xFFFFFF;
  return `hsl(${hash % 360}, 65%, 55%)`;
}
function avatarLabelFor(name){
  if (!name) return '?';
  const ascii = name.match(/[A-Za-z0-9]/);
  if (ascii) return ascii[0].toUpperCase();
  return name.trim().charAt(0) || '?';
}

function connect(){
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url = `${proto}//${location.host}/ws`;
  setConnStatus('connecting');
  state.ws = new WebSocket(url);
  state.ws.addEventListener('open', ()=>{
    setConnStatus('online');
    const savedName = localStorage.getItem('pairdrop:name');
    if (savedName) sendWs({ type: 'set-name', name: savedName });
  });
  state.ws.addEventListener('close', ()=>{
    setConnStatus('offline');
    setTimeout(connect, 1500);
  });
  state.ws.addEventListener('error', ()=>{});
  state.ws.addEventListener('message', (e)=>{
    if (typeof e.data === 'string'){
      try { handleServerMessage(JSON.parse(e.data)); } catch(err) { console.error('msg parse', err, e.data); }
    }
  });
}
function sendWs(msg){
  if (!state.ws || state.ws.readyState !== 1){ toast('未连接到服务器', 'error'); return false; }
  state.ws.send(JSON.stringify(msg));
  return true;
}
function setConnStatus(s){
  const dot = $('conn-dot'); const text = $('conn-text');
  dot.className = 'status-dot ' + (s==='online' ? '' : s);
  text.textContent = s==='online' ? '在线' : (s==='connecting' ? '连接中…' : '已断开，重连中');
}

function handleServerMessage(msg){
  switch (msg.type){
    case 'welcome':
      state.selfId = msg.peerId;
      state.selfName = msg.displayName;
      $('self-name-input').value = msg.displayName;
      $('self-avatar').textContent = avatarLabelFor(msg.displayName);
      $('self-avatar').style.background = avatarColorFor(msg.peerId);
      break;
    case 'peers':
      state.peers = msg.peers || [];
      renderPeers();
      // 如果当前选中的 peer 还在，刷新标题；否则保持现在的对话窗口（消息记录还在 conversations 里）
      renderSelected();
      break;
    case 'text':
      addMessage(msg.from, { kind: 'text', from: msg.from, fromName: msg.fromName, text: msg.text, ts: msg.ts });
      break;
    case 'file':
      addMessage(msg.from, { kind: 'file', from: msg.from, fromName: msg.fromName, token: msg.token, name: msg.name, size: msg.size, mime: msg.mime, ts: msg.ts });
      break;
    case 'error':
      toast(msg.message || '出错了', 'error');
      break;
  }
}

// 关键修复：每次都重新构建 DOM，不依赖之前保存的 #peer-empty 引用，
// 避免「第一次 render 后 empty 节点被清掉、下一次 render 拿到 null」导致整个函数抛错的问题。
// 这个 bug 之前会让点击 peer 时 renderPeers 抛出 TypeError → renderSelected 不被调用 → 聊天界面打不开。
function renderPeers(){
  const list = $('peer-list');
  if (!list) return;
  const others = (state.peers || []).filter(p => !p.isSelf);

  // 全量重建
  list.innerHTML = '';

  if (others.length === 0){
    const empty = document.createElement('div');
    empty.className = 'peer-empty';
    empty.innerHTML = `
      <div style="font-size: 32px; margin-bottom: 8px;">👥</div>
      <div>等待其他设备连接…</div>
      <div style="margin-top: 8px; font-size: 11px;">让其他设备扫码或访问地址加入</div>
    `;
    list.appendChild(empty);
    return;
  }

  for (const peer of others){
    const item = document.createElement('button');
    item.type = 'button';
    item.className = 'peer-item' + (state.selected === peer.peerId ? ' active' : '');
    const unread = state.unread.get(peer.peerId) || 0;
    item.innerHTML = `
      <div class="avatar" style="background:${avatarColorFor(peer.peerId)}">${escapeHTML(avatarLabelFor(peer.displayName))}</div>
      <div class="peer-info">
        <div class="peer-name">${escapeHTML(peer.displayName)}</div>
        <div class="peer-meta">${escapeHTML(deviceTypeLabel(peer.deviceType))}</div>
      </div>
      ${unread > 0 ? `<div class="peer-badge">${unread}</div>` : ''}
    `;
    item.addEventListener('click', ()=> selectPeer(peer.peerId));
    list.appendChild(item);
  }
}
function deviceTypeLabel(t){
  switch(t){
    case 'desktop': return '桌面端';
    case 'mobile': return '手机';
    default: return '浏览器';
  }
}
function selectPeer(peerId){
  state.selected = peerId;
  state.unread.delete(peerId);
  renderPeers();
  renderSelected();
  // 仅在移动端关闭侧边栏
  if (window.innerWidth <= 720) $('sidebar').classList.remove('open');
}
function renderSelected(){
  const peer = (state.peers || []).find(p => p.peerId === state.selected);
  const messagesEl = $('messages');
  const composerEl = $('composer');
  const emptyEl = $('empty-main');
  const titleEl = $('main-title');
  if (!peer){
    if (messagesEl) messagesEl.style.display = 'none';
    if (composerEl) composerEl.style.display = 'none';
    if (emptyEl) emptyEl.style.display = 'flex';
    if (titleEl) titleEl.innerHTML = `<div class="main-title-name">选择一个设备开始</div><div class="main-title-sub">点击左侧设备发起聊天和传输</div>`;
    return;
  }
  if (messagesEl) messagesEl.style.display = 'flex';
  if (composerEl) composerEl.style.display = 'block';
  if (emptyEl) emptyEl.style.display = 'none';
  if (titleEl) titleEl.innerHTML = `
    <div class="main-title-name">${escapeHTML(peer.displayName)}</div>
    <div class="main-title-sub">${escapeHTML(deviceTypeLabel(peer.deviceType))} · 局域网</div>
  `;
  renderMessages();
}

function addMessage(peerId, msg){
  if (!state.conversations.has(peerId)) state.conversations.set(peerId, []);
  state.conversations.get(peerId).push(msg);
  if (state.selected === peerId) {
    renderMessages();
  } else {
    state.unread.set(peerId, (state.unread.get(peerId) || 0) + 1);
    renderPeers();
  }
}
function updateMessage(peerId, localId, patch){
  const arr = state.conversations.get(peerId);
  if (!arr) return;
  const m = arr.find(x => x.localId === localId);
  if (!m) return;
  Object.assign(m, patch);
  if (state.selected === peerId) renderMessages();
}
function genLocalId(){
  return 'l-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8);
}
function renderMessages(){
  const peerId = state.selected;
  const msgs = state.conversations.get(peerId) || [];
  const box = $('messages');
  if (!box) return;
  box.innerHTML = '';
  for (const m of msgs){
    const isSelf = m.from === state.selfId;
    const div = document.createElement('div');
    div.className = 'msg' + (isSelf ? ' self' : '');
    if (m.kind === 'text'){
      div.innerHTML = `<div><div class="msg-body">${escapeHTML(m.text)}</div><div class="msg-time">${formatTime(m.ts)}</div></div>`;
    } else if (m.kind === 'file'){
      const ext = (m.name.split('.').pop() || '').toUpperCase().slice(0,4);
      const isUploading = isSelf && typeof m.uploadProgress === 'number' && m.uploadProgress < 100;
      const isFailed = isSelf && m.uploadFailed;
      const downloadUrl = m.token ? `/api/file/${encodeURIComponent(m.token)}` : '';
      let actionsHtml = '';
      if (isFailed){
        actionsHtml = `<div class="msg-file-status msg-file-error">上传失败</div>`;
      } else if (isUploading){
        actionsHtml = `
          <div class="msg-file-progress"><div class="msg-file-progress-bar" style="width:${m.uploadProgress}%"></div></div>
          <div class="msg-file-status">上传中 ${m.uploadProgress}%</div>
        `;
      } else if (!isSelf && m.token){
        actionsHtml = `<div class="msg-file-actions"><a class="msg-file-btn" href="${downloadUrl}" download="${escapeHTML(m.name)}">下载</a></div>`;
      } else if (isSelf){
        actionsHtml = `<div class="msg-file-status">已发送</div>`;
      }
      div.innerHTML = `
        <div>
          <div class="msg-body">
            <div class="msg-file">
              <div class="msg-file-icon">${ext || '📄'}</div>
              <div style="flex:1;min-width:0">
                <div class="msg-file-name">${escapeHTML(m.name)}</div>
                <div class="msg-file-meta">${formatBytes(m.size)}</div>
                ${actionsHtml}
              </div>
            </div>
          </div>
          <div class="msg-time">${formatTime(m.ts)}</div>
        </div>
      `;
    }
    box.appendChild(div);
  }
  box.scrollTop = box.scrollHeight;
}

function sendText(){
  const input = $('text-input');
  const text = input.value.trim();
  if (!text){ return; }
  if (!state.selected){ toast('请先选择一个设备', 'error'); return; }
  const ok = sendWs({ type: 'send-text', to: state.selected, text });
  if (!ok) return;
  addMessage(state.selected, { kind: 'text', from: state.selfId, text, ts: Date.now() });
  input.value = '';
  input.style.height = 'auto';
}
async function sendFiles(files){
  if (!state.selected){ toast('请先选择一个设备', 'error'); return; }
  for (const file of files) await sendOneFile(file);
}
async function sendOneFile(file){
  if (file.size > 2 * 1024 * 1024 * 1024){ toast(`${file.name} 超过 2GB 上限`, 'error'); return; }
  const peerId = state.selected;
  const localId = genLocalId();
  // 立即插入占位气泡,uploadProgress=0 显示进度条
  addMessage(peerId, {
    kind: 'file',
    localId,
    from: state.selfId,
    token: '',
    name: file.name,
    size: file.size,
    mime: file.type || null,
    ts: Date.now(),
    uploadProgress: 0,
  });

  try {
    const form = new FormData();
    form.append('to', peerId);
    form.append('file', file, file.name);
    const xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/upload', true);
    xhr.upload.onprogress = (e) => {
      if (!e.lengthComputable) return;
      // 上限 99 留给收到 token 后切到「已发送」状态,避免 100% 但还没拿到 token 的歧义
      const pct = Math.min(99, Math.round((e.loaded / e.total) * 100));
      updateMessage(peerId, localId, { uploadProgress: pct });
    };
    const tokenPromise = new Promise((resolve, reject) => {
      xhr.onload = () => {
        if (xhr.status >= 200 && xhr.status < 300){
          try { resolve(JSON.parse(xhr.responseText)); } catch(e){ reject(e); }
        } else reject(new Error('上传失败: ' + xhr.status));
      };
      xhr.onerror = () => reject(new Error('网络错误'));
    });
    xhr.send(form);
    const res = await tokenPromise;
    sendWs({ type: 'notify-file', to: peerId, token: res.token, name: file.name, size: file.size, mime: file.type || null });
    updateMessage(peerId, localId, { token: res.token, uploadProgress: 100 });
  } catch(err) {
    updateMessage(peerId, localId, { uploadFailed: true, uploadProgress: undefined });
    toast('发送 ' + file.name + ' 失败: ' + err.message, 'error');
  }
}

function escapeHTML(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function formatBytes(b){
  if (b<1024) return b+' B';
  if (b<1024*1024) return (b/1024).toFixed(1)+' KB';
  if (b<1024*1024*1024) return (b/1024/1024).toFixed(1)+' MB';
  return (b/1024/1024/1024).toFixed(2)+' GB';
}
function formatTime(ts){
  const d = new Date(ts);
  const pad = (n)=> String(n).padStart(2,'0');
  return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

$('show-qr-btn').addEventListener('click', async ()=>{
  try {
    const res = await fetch('/api/info');
    const info = await res.json();
    showUrlsModal(info.urls || []);
  } catch(e) { toast('获取地址失败', 'error'); }
});
function showUrlsModal(urls){
  const mask = document.createElement('div');
  mask.className = 'modal-mask';
  mask.innerHTML = `
    <div class="modal">
      <h3 class="modal-title">接入地址 <button class="modal-close" id="m-close">×</button></h3>
      <div style="color:var(--text-secondary);font-size:13px;line-height:1.6;margin-bottom:16px">
        在桌面端工具页可以看到二维码方便扫描。这里列出当前局域网下所有可用的接入地址。
      </div>
      <div id="urls"></div>
    </div>
  `;
  document.body.appendChild(mask);
  const urlsBox = mask.querySelector('#urls');
  for (const u of urls){
    const card = document.createElement('div');
    card.className = 'url-card';
    card.innerHTML = `
      <div class="url-iface">${escapeHTML(u.interface)} · ${escapeHTML(u.ip)}</div>
      <div class="url-row">
        <div class="url-text">${escapeHTML(u.url)}</div>
        <button class="url-copy">复制</button>
      </div>
    `;
    urlsBox.appendChild(card);
    card.querySelector('.url-copy').addEventListener('click', async ()=>{
      try { await navigator.clipboard.writeText(u.url); toast('已复制', 'success'); } catch(e){ toast('复制失败', 'error'); }
    });
  }
  mask.addEventListener('click', (e)=>{ if (e.target === mask) mask.remove(); });
  mask.querySelector('#m-close').addEventListener('click', ()=> mask.remove());
}

$('attach-btn').addEventListener('click', ()=> $('file-input').click());
$('file-input').addEventListener('change', (e)=>{
  const files = Array.from(e.target.files || []);
  if (files.length) sendFiles(files);
  e.target.value = '';
});
$('send-btn').addEventListener('click', sendText);
$('text-input').addEventListener('keydown', (e)=>{
  if (e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendText(); }
});
$('text-input').addEventListener('input', (e)=>{
  e.target.style.height = 'auto';
  e.target.style.height = Math.min(140, e.target.scrollHeight) + 'px';
});
$('self-name-input').addEventListener('change', (e)=>{
  const v = e.target.value.trim();
  if (!v) return;
  localStorage.setItem('pairdrop:name', v);
  sendWs({ type: 'set-name', name: v });
});
$('back-btn').addEventListener('click', ()=>{ $('sidebar').classList.add('open'); });

// Drag-drop with visual feedback
let dragCounter = 0;
const overlay = $('drop-overlay');
window.addEventListener('dragenter', (e)=>{
  if (!e.dataTransfer || !Array.from(e.dataTransfer.types || []).includes('Files')) return;
  dragCounter++;
  e.preventDefault();
  if (state.selected) overlay.classList.add('show');
});
window.addEventListener('dragover', (e)=>{
  if (e.dataTransfer && Array.from(e.dataTransfer.types || []).includes('Files')) e.preventDefault();
});
window.addEventListener('dragleave', ()=>{
  dragCounter = Math.max(0, dragCounter - 1);
  if (dragCounter === 0) overlay.classList.remove('show');
});
window.addEventListener('drop', (e)=>{
  e.preventDefault();
  dragCounter = 0;
  overlay.classList.remove('show');
  const files = Array.from(e.dataTransfer?.files || []);
  if (!files.length) return;
  if (!state.selected){ toast('请先选择一个设备', 'error'); return; }
  sendFiles(files);
});

// Default state: on mobile show sidebar (no peer selected yet)
if (window.innerWidth <= 720) $('sidebar').classList.add('open');
// 渲染一次空 peer 列表，避免初始白屏
renderPeers();
connect();
</script>
